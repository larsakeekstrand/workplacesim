[package]
name = "workplacesim"
version = "0.1.0"
edition = "2021"
rust-version = "1.75"

[features]
default = ["fb"]
fb = []
desktop = []

[dependencies]
tokio = { version = "1", features = ["sync", "rt", "rt-multi-thread", "macros", "time"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
indexmap = { version = "2", features = ["serde"] }

[dev-dependencies]
tokio = { version = "1", features = ["sync", "rt", "rt-multi-thread", "macros", "time", "test-util"] }
